<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4G Live Departures Board</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: #0d1117;
      --line: #1f6feb;
      --text: #f8fafc;
      --muted: #9aa4b2;
      --border: #1f2937;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .board {
      width: min(1100px, 100%);
      background: linear-gradient(180deg, #0b0f14 0%, #090c10 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
      background: #0f141b;
    }

    .stop-name {
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: .02em;
      margin: 0;
    }

    .clock {
      text-align: right;
      min-width: 180px;
    }

    .clock-time {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1;
    }

    .clock-date {
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
      min-height: 24px;
    }

    .table-head,
    .row {
      display: grid;
      grid-template-columns: 160px 1fr 180px;
      gap: 18px;
      align-items: center;
    }

    .table-head {
      padding: 16px 32px;
      color: var(--muted);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
    }

    .rows {
      padding: 8px 0;
    }

    .row {
      padding: 20px 32px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      min-height: 108px;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .line-pill {
      width: 108px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--line);
      color: white;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: .03em;
    }

    .destination {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.1;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
    }

    .eta {
      text-align: right;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      line-height: 1;
    }

    .eta small {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 32px 24px;
      color: var(--muted);
      font-size: 15px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .empty,
    .error {
      margin: 24px 32px;
      padding: 22px;
      border-radius: 20px;
      font-size: 20px;
    }

    .empty {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
    }

    .error {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.28);
      color: #fecaca;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--ok);
      vertical-align: middle;
      box-shadow: 0 0 0 0 rgba(34,197,94,.7);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,.7); }
      70% { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    @media (max-width: 760px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .clock {
        text-align: left;
      }
      .table-head {
        display: none;
      }
      .row {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 22px;
      }
      .eta {
        text-align: left;
      }
      .line-pill {
        width: 92px;
        height: 56px;
        font-size: 30px;
      }
      #qrWrap {
        width: 100%;
        margin-left: 0 !important;
      }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="header">
      <div>
        <h1 class="stop-name">4G Live Departures Board</h1>
      </div>
      <div class="clock">
        <div class="clock-time" id="clockTime">--:--</div>
        <div class="clock-date" id="clockDate">--</div>
      </div>
    </section>

    <section class="table-head">
      <div>Line</div>
      <div>Destination</div>
      <div style="text-align:right;">Arrival</div>
    </section>

    <section class="rows" id="rows"></section>
    <div class="error" id="error" hidden></div>

    <footer class="statusbar">
      <div id="status"><span class="dot"></span>Connecting to live data…</div>
      <div id="updated">Not updated yet</div>
      <div id="qrWrap" style="margin-left:auto; display:flex; align-items:center; gap:12px;">
        <img id="qrImage" alt="QR code for this board" style="width:84px;height:84px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:white;padding:6px;" />
        <div style="max-width:180px; line-height:1.35;">
          <div style="font-weight:700; color:var(--text);">Open on your phone</div>
          <div style="color:var(--muted); font-size:13px;">Scan the QR code after you publish this page.</div>
        </div>
      </div>
    </footer>
  </main>

  <script>
    const CONFIG = {
      stopName: 'Šilo tiltas',
      line: '4G',
      stopIds: ['1139', '1129'],
      refreshMs: 20000,
      proxy: '',
      publicUrl: 'https://skujic.github.io/4g-live-board/',
      soundAlertMinutes: [1, 2],
      sourceUrl: stopId => `https://www.stops.lt/vilnius/departures2.php?stopid=${stopId}`
    };

    const el = {
      rows: document.getElementById('rows'),
      error: document.getElementById('error'),
      status: document.getElementById('status'),
      updated: document.getElementById('updated'),
      clockTime: document.getElementById('clockTime'),
      clockDate: document.getElementById('clockDate'),
      qrImage: document.getElementById('qrImage')
    };

    const alertState = new Set();
    let lastRenderedTime = '';
    let lastRenderedDate = '';

    function updateClock() {
      const now = new Date();
      const nextTime = now.toLocaleTimeString('en-GB', {
        hour: '2-digit',
        minute: '2-digit'
      });
      const nextDate = now.toLocaleDateString('en-GB', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      if (nextTime !== lastRenderedTime) {
        el.clockTime.textContent = nextTime;
        lastRenderedTime = nextTime;
      }

      if (nextDate !== lastRenderedDate) {
        el.clockDate.textContent = nextDate;
        lastRenderedDate = nextDate;
      }
    }

    function initQrCode() {
      const target = CONFIG.publicUrl || window.location.href;

      el.qrImage.onerror = () => {
        const wrap = document.getElementById('qrWrap');
        wrap.innerHTML = `
          <div style="color: var(--muted); font-size: 13px;">
            QR code could not load.<br>
            Open this link on your phone:<br>
            <a href="${target}" style="color: white; word-break: break-all;">${target}</a>
          </div>
        `;
      };

      el.qrImage.src = `https://quickchart.io/qr?text=${encodeURIComponent(target)}&size=220`;
    }

    function playAlertBeep() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const now = ctx.currentTime;
        [880, 1174].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02 + i * 0.18);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16 + i * 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now + i * 0.18);
          osc.stop(now + 0.18 + i * 0.18);
        });
      } catch (e) {}
    }

    function maybePlayArrivalAlert(arrivals) {
      const trackedKeys = new Set();
      for (const item of arrivals) {
        if (!CONFIG.soundAlertMinutes.includes(item.minutes)) continue;
        const key = `${item.destination}|${item.minutes}`;
        trackedKeys.add(key);
        if (!alertState.has(key)) {
          alertState.add(key);
          playAlertBeep();
        }
      }
      for (const existing of Array.from(alertState)) {
        if (!trackedKeys.has(existing)) alertState.delete(existing);
      }
    }

    function fetchUrl(url) {
      return fetch(CONFIG.proxy ? `${CONFIG.proxy}${encodeURIComponent(url)}` : url, {
        headers: { Accept: 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' }
      }).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.text();
      });
    }

    function textMinutes(text) {
      const t = (text || '').trim().toLowerCase();
      if (!t) return null;
      if (t.includes('atvyk') || t === '0' || t === '0 min') return 0;
      const m = t.match(/(\d+)\s*min/);
      if (m) return Number(m[1]);
      if (/^\d+$/.test(t)) return Number(t);
      return null;
    }

    function uniqueBy(items, keyFn) {
      const seen = new Set();
      return items.filter(item => {
        const key = keyFn(item);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function parseDepartures(html, stopId) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const text = doc.body?.innerText || '';
      const candidates = [];
      const rows = Array.from(doc.querySelectorAll('tr, li, .departure, .times, .time, .item'));

      for (const row of rows) {
        const rowText = row.textContent.replace(/\s+/g, ' ').trim();
        if (!rowText || !rowText.includes(CONFIG.line)) continue;
        const minuteMatch = rowText.match(/(\d+\s*min|atvyksta|Atvyksta|^\d+$)/);
        const routeMatch = rowText.match(/\b(\d+G?|N\d+)\b/);
        const destination = rowText
          .replace(/\b(\d+G?|N\d+)\b/, '')
          .replace(/(\d+\s*min|atvyksta|Atvyksta|^\d+$)/, '')
          .trim();
        const minutes = textMinutes(minuteMatch?.[0] || '');

        if ((routeMatch?.[1] || '') === CONFIG.line && minutes !== null) {
          candidates.push({
            line: CONFIG.line,
            destination: destination || 'Direction unavailable',
            minutes,
            stopId,
            raw: rowText
          });
        }
      }

      if (!candidates.length && text.includes(CONFIG.line)) {
        const regex = new RegExp(`\\b${CONFIG.line}\\b[^\\n]{0,120}?(\\d+\\s*min|atvyksta|Atvyksta|\\b\\d+\\b)`, 'g');
        for (const match of text.matchAll(regex)) {
          const raw = match[0].replace(/\s+/g, ' ').trim();
          const minutes = textMinutes(match[1]);
          if (minutes !== null) {
            const destination = raw
              .replace(new RegExp(`\\b${CONFIG.line}\\b`), '')
              .replace(/(\d+\s*min|atvyksta|Atvyksta|\b\d+\b)/, '')
              .trim() || 'Direction unavailable';
            candidates.push({ line: CONFIG.line, destination, minutes, stopId, raw });
          }
        }
      }

      return uniqueBy(candidates, x => `${x.destination}|${x.minutes}|${x.stopId}`)
        .sort((a, b) => a.minutes - b.minutes)
        .slice(0, 6);
    }

    function render(arrivals) {
      el.error.hidden = true;

      if (!arrivals.length) {
        el.rows.innerHTML = `<div class="empty">No live 4G departures found right now.</div>`;
        return;
      }

      el.rows.innerHTML = arrivals.map(item => {
        const eta = item.minutes === 0 ? 'Now' : `${item.minutes} min`;
        return `
          <article class="row">
            <div><div class="line-pill">${escapeHtml(item.line)}</div></div>
            <div>
              <div class="destination">${escapeHtml(item.destination)}</div>
              <div class="meta">Stop source ID ${escapeHtml(item.stopId)}</div>
            </div>
            <div class="eta">${eta}<small>live</small></div>
          </article>
        `;
      }).join('');
    }

    async function load() {
      el.status.innerHTML = '<span class="dot"></span>Refreshing live data…';
      const results = await Promise.allSettled(
        CONFIG.stopIds.map(async stopId => {
          const html = await fetchUrl(CONFIG.sourceUrl(stopId));
          return parseDepartures(html, stopId);
        })
      );

      const arrivals = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
      const okCount = results.filter(r => r.status === 'fulfilled').length;

      if (!arrivals.length && okCount === 0) {
        throw new Error('The browser could not read live data. This is usually a CORS block. Add a tiny proxy URL in CONFIG.proxy before publishing.');
      }

      const merged = uniqueBy(arrivals, x => `${x.destination}|${x.minutes}`)
        .sort((a, b) => a.minutes - b.minutes)
        .slice(0, 4);

      render(merged);
      maybePlayArrivalAlert(merged);
      el.status.innerHTML = `<span class="dot"></span>${okCount === CONFIG.stopIds.length ? 'Live data OK' : `Partial live data OK (${okCount}/${CONFIG.stopIds.length})`}`;
      el.updated.textContent = `Updated: ${new Date().toLocaleTimeString('en-GB')}`;
    }

    async function refreshLoop() {
      updateClock();
      try {
        await load();
      } catch (err) {
        el.error.hidden = false;
        el.error.textContent = err.message;
        el.status.textContent = 'Live data unavailable';
        el.rows.innerHTML = '';
      }
    }

    updateClock();
    initQrCode();
    refreshLoop();
    setInterval(updateClock, 1000);
    setInterval(refreshLoop, CONFIG.refreshMs);
  </script>
</body>
</html>
