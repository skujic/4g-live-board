<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4G Live Departures Board</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#05070b;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#0b0f14;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
background:#0f141b;
border-bottom:1px solid #1f2937;
}

.title{
font-size:34px;
font-weight:800;
}

.clock{
text-align:right;
}

.clock-time{
font-size:32px;
font-weight:700;
}

.clock-date{
font-size:14px;
color:#9aa4b2;
margin-top:4px;
}

.section{
padding:20px;
border-top:1px solid #1f2937;
}

.section-title{
font-size:22px;
font-weight:800;
margin-bottom:15px;
}

.table-head,
.row{
display:grid;
grid-template-columns:120px 1fr 120px;
gap:10px;
align-items:center;
}

.table-head{
color:#9aa4b2;
font-size:12px;
text-transform:uppercase;
margin-bottom:10px;
}

.row{
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.05);
}

.line{
background:#1f6feb;
padding:8px;
border-radius:10px;
font-weight:700;
text-align:center;
}

.destination{
font-size:18px;
font-weight:700;
}

.eta{
text-align:right;
font-size:18px;
font-weight:800;
}

.footer{
padding:15px 20px;
border-top:1px solid #1f2937;
font-size:13px;
color:#9aa4b2;
}

@media (max-width:760px){

.table-head,
.row{
grid-template-columns:70px 1fr 70px;
}

.title{
font-size:26px;
}

.clock-time{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">4G Live Departures Board</div>

<div class="clock">
<div class="clock-time" id="clockTime">--:--</div>
<div class="clock-date" id="clockDate">--</div>
</div>
</div>


<div class="section">

<div class="section-title">
Šilo Tiltas → Europos Aikštė
</div>

<div class="table-head">
<div>Line</div>
<div>Destination</div>
<div>Arrival</div>
</div>

<div id="rows-silo"></div>

</div>


<div class="section">

<div class="section-title">
Europos Aikštė → Šilo Tiltas
</div>

<div class="table-head">
<div>Line</div>
<div>Destination</div>
<div>Arrival</div>
</div>

<div id="rows-europa"></div>

</div>

<div class="footer">
Live data refresh every 20 seconds
</div>

</div>


<script>

function updateClock(){

const now = new Date()

document.getElementById("clockTime").innerText =
now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})

document.getElementById("clockDate").innerText =
now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})

}

setInterval(updateClock,1000)
updateClock()


const STOP_SILO = ["1139","1129"]
const STOP_EUROPA = ["0104"]

async function fetchStop(stop){

let url=`https://www.stops.lt/vilnius/departures2.php?stopid=${stop}`

let r = await fetch(url)

let text = await r.text()

return text

}

function renderRow(destination,minutes){

return `
<div class="row">
<div class="line">4G</div>
<div class="destination">${destination}</div>
<div class="eta">${minutes==0?"Now":minutes+" min"}</div>
</div>
`

}

async function loadBoard(){

let siloContainer=document.getElementById("rows-silo")
let europaContainer=document.getElementById("rows-europa")

siloContainer.innerHTML=""
europaContainer.innerHTML=""

try{

for(let stop of STOP_SILO){

let html=await fetchStop(stop)

let matches=[...html.matchAll(/4G.*?(\\d+)\\s*min/gi)]

matches.slice(0,4).forEach(m=>{

let minutes=m[1]

siloContainer.innerHTML+=renderRow("Europos Aikštė",minutes)

})

}

for(let stop of STOP_EUROPA){

let html=await fetchStop(stop)

let matches=[...html.matchAll(/4G.*?(\\d+)\\s*min/gi)]

matches.slice(0,4).forEach(m=>{

let minutes=m[1]

europaContainer.innerHTML+=renderRow("Šilo Tiltas",minutes)

})

}

}catch(e){

console.log("Live data loading issue")

}

}

loadBoard()
setInterval(loadBoard,20000)

</script>

</body>
</html>
