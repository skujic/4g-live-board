<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4G Debug Board</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#05070b;
  color:white;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
  background:#0b0f14;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}
.title{
  font-size:34px;
  font-weight:800;
}
.clock{
  text-align:right;
}
.clock-time{
  font-size:32px;
  font-weight:700;
}
.clock-date{
  font-size:14px;
  color:#9aa4b2;
  margin-top:4px;
}
.status{
  padding:14px 20px;
  border-bottom:1px solid #1f2937;
  color:#cbd5e1;
  font-size:14px;
}
.section{
  padding:20px;
  border-top:1px solid #1f2937;
}
.section-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:15px;
}
.table-head,.row{
  display:grid;
  grid-template-columns:100px 90px 1fr 110px 90px;
  gap:10px;
  align-items:center;
}
.table-head{
  color:#9aa4b2;
  font-size:12px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.row{
  padding:12px 0;
  border-top:1px solid rgba(255,255,255,0.05);
}
.cell-stop{
  color:#cbd5e1;
  font-weight:700;
}
.cell-line{
  background:#1f6feb;
  padding:8px;
  border-radius:10px;
  font-weight:700;
  text-align:center;
}
.cell-destination{
  font-size:18px;
  font-weight:700;
}
.cell-minutes{
  text-align:right;
  font-size:18px;
  font-weight:800;
}
.cell-raw{
  text-align:right;
  color:#9aa4b2;
  font-size:14px;
}
.empty{
  color:#9aa4b2;
  padding:8px 0;
}
.footer{
  padding:15px 20px;
  border-top:1px solid #1f2937;
  font-size:13px;
  color:#9aa4b2;
}
@media (max-width:760px){
  .title{font-size:26px;}
  .clock-time{font-size:24px;}
  .table-head,.row{
    grid-template-columns:70px 70px 1fr 70px 60px;
    font-size:11px;
  }
  .cell-destination{
    font-size:15px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">4G Debug Board</div>
    <div class="clock">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">--</div>
    </div>
  </div>

  <div class="status" id="statusBox">Loading live debug data…</div>

  <div class="section">
    <div class="section-title">Debug Section A — Stop 1129</div>
    <div class="table-head">
      <div>Stop</div>
      <div>Line</div>
      <div>Destination</div>
      <div>Value</div>
      <div>Raw</div>
    </div>
    <div id="rows-1129"></div>
  </div>

  <div class="section">
    <div class="section-title">Debug Section B — Stop 0104</div>
    <div class="table-head">
      <div>Stop</div>
      <div>Line</div>
      <div>Destination</div>
      <div>Value</div>
      <div>Raw</div>
    </div>
    <div id="rows-0104"></div>
  </div>

  <div class="footer">
    This debug version shows the exact 4G records returned by your Vercel API. Refresh every 20 seconds.
  </div>
</div>

<script>
function updateClock(){
  const now = new Date();
  document.getElementById("clockTime").innerText =
    now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("clockDate").innerText =
    now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

async function fetchStop(stop){
  const url = `/api/departures?stop=${stop}&line=4G`;
  const r = await fetch(url, { cache:"no-store" });
  return await r.json();
}

function renderRow(stopId, item){
  const valueText = Number.isFinite(item.minutes) ? item.minutes : "-";
  const rawText = item.rawField ?? "-";

  return `
    <div class="row">
      <div class="cell-stop">${stopId}</div>
      <div class="cell-line">${item.line || "4G"}</div>
      <div class="cell-destination">${item.destination || "-"}</div>
      <div class="cell-minutes">${valueText}</div>
      <div class="cell-raw">${rawText}</div>
    </div>
  `;
}

function renderEmpty(container, text){
  container.innerHTML = `<div class="empty">${text}</div>`;
}

async function loadBoard(){
  const rows1129 = document.getElementById("rows-1129");
  const rows0104 = document.getElementById("rows-0104");
  const statusBox = document.getElementById("statusBox");

  rows1129.innerHTML = "";
  rows0104.innerHTML = "";

  try{
    const [data1129, data0104] = await Promise.all([
      fetchStop("1129"),
      fetchStop("0104")
    ]);

    if (data1129.ok && Array.isArray(data1129.departures) && data1129.departures.length){
      rows1129.innerHTML = data1129.departures.map(item => renderRow("1129", item)).join("");
    } else {
      renderEmpty(rows1129, "No 4G rows found for stop 1129.");
    }

    if (data0104.ok && Array.isArray(data0104.departures) && data0104.departures.length){
      rows0104.innerHTML = data0104.departures.map(item => renderRow("0104", item)).join("");
    } else {
      renderEmpty(rows0104, "No 4G rows found for stop 0104.");
    }

    statusBox.innerText = "Debug data loaded. Check destinations and values for each stop.";
  } catch (e){
    statusBox.innerText = "Could not load debug data.";
    renderEmpty(rows1129, "No data.");
    renderEmpty(rows0104, "No data.");
    console.error(e);
  }
}

loadBoard();
setInterval(loadBoard, 20000);
</script>

</body>
</html>
