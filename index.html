<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4G Live Departures Board</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#05070b;
  color:white;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:#0b0f14;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}

.title{
  font-size:34px;
  font-weight:800;
}

.clock{
  text-align:right;
}

.clock-time{
  font-size:32px;
  font-weight:700;
}

.clock-date{
  font-size:14px;
  color:#9aa4b2;
  margin-top:4px;
}

.status{
  padding:14px 20px;
  border-bottom:1px solid #1f2937;
  font-size:14px;
  color:#cbd5e1;
}

.section{
  padding:20px;
  border-top:1px solid #1f2937;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:15px;
}

.table-head,
.row{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  gap:10px;
  align-items:center;
}

.table-head{
  color:#9aa4b2;
  font-size:12px;
  text-transform:uppercase;
  margin-bottom:10px;
}

.row{
  padding:12px 0;
  border-top:1px solid rgba(255,255,255,0.05);
}

.line{
  background:#1f6feb;
  padding:8px;
  border-radius:10px;
  font-weight:700;
  text-align:center;
}

.destination{
  font-size:18px;
  font-weight:700;
}

.eta{
  text-align:right;
  font-size:18px;
  font-weight:800;
}

.empty{
  color:#9aa4b2;
  padding:8px 0;
}

.footer{
  padding:15px 20px;
  border-top:1px solid #1f2937;
  font-size:13px;
  color:#9aa4b2;
}

@media (max-width:760px){
  .table-head,
  .row{
    grid-template-columns:70px 1fr 70px;
  }

  .title{
    font-size:26px;
  }

  .clock-time{
    font-size:24px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">4G Live Departures Board</div>

    <div class="clock">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">--</div>
    </div>
  </div>

  <div class="status" id="statusBox">Loading live departures…</div>

  <div class="section">
    <div class="section-title">Šilo Tiltas → Europos Aikštė</div>

    <div class="table-head">
      <div>Line</div>
      <div>Destination</div>
      <div>Arrival</div>
    </div>

    <div id="rows-silo"></div>
  </div>

  <div class="section">
    <div class="section-title">Europos Aikštė → Šilo Tiltas</div>

    <div class="table-head">
      <div>Line</div>
      <div>Destination</div>
      <div>Arrival</div>
    </div>

    <div id="rows-europa"></div>
  </div>

  <div class="footer">
    Live data refresh every 20 seconds
  </div>

</div>

<script>
function updateClock(){
  const now = new Date();

  document.getElementById("clockTime").innerText =
    now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

  document.getElementById("clockDate").innerText =
    now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

setInterval(updateClock,1000);
updateClock();

const STOP_SILO = ["1139","1129"];
const STOP_EUROPA = ["0104"];

async function fetchStop(stop){
  const url = `/api/departures?stop=${stop}`;
  const r = await fetch(url, { cache: "no-store" });
  return await r.json();
}

function renderRow(destination, minutes){
  return `
    <div class="row">
      <div class="line">4G</div>
      <div class="destination">${destination}</div>
      <div class="eta">${minutes === 0 ? "Now" : minutes + " min"}</div>
    </div>
  `;
}

function renderEmpty(container, text){
  container.innerHTML = `<div class="empty">${text}</div>`;
}

async function loadBoard(){
  const siloContainer = document.getElementById("rows-silo");
  const europaContainer = document.getElementById("rows-europa");
  const statusBox = document.getElementById("statusBox");

  siloContainer.innerHTML = "";
  europaContainer.innerHTML = "";

  try{
    let siloMinutes = [];
    let europaMinutes = [];

    for (const stop of STOP_SILO){
      const data = await fetchStop(stop);
      if (data.ok && Array.isArray(data.minutes)) {
        siloMinutes = siloMinutes.concat(data.minutes);
      }
    }

    for (const stop of STOP_EUROPA){
      const data = await fetchStop(stop);
      if (data.ok && Array.isArray(data.minutes)) {
        europaMinutes = europaMinutes.concat(data.minutes);
      }
    }

    siloMinutes = [...new Set(siloMinutes)].sort((a,b)=>a-b).slice(0,4);
    europaMinutes = [...new Set(europaMinutes)].sort((a,b)=>a-b).slice(0,4);

    if (siloMinutes.length) {
      siloContainer.innerHTML = siloMinutes.map(m => renderRow("Europos Aikštė", m)).join("");
    } else {
      renderEmpty(siloContainer, "No live 4G departures found for this direction.");
    }

    if (europaMinutes.length) {
      europaContainer.innerHTML = europaMinutes.map(m => renderRow("Šilo Tiltas", m)).join("");
    } else {
      renderEmpty(europaContainer, "No live 4G departures found for this direction.");
    }

    statusBox.innerText = "Live departures loaded successfully.";
  }
  catch(e){
    statusBox.innerText = "Live departures could not be loaded. Check that Vercel deployed both index.html and api/departures.js.";
    renderEmpty(siloContainer, "No live data.");
    renderEmpty(europaContainer, "No live data.");
    console.error(e);
  }
}

loadBoard();
setInterval(loadBoard, 20000);
</script>

</body>
</html>
